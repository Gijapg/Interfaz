name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 1. Configurar Java 17 para las herramientas de Android
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. Caché para acelerar futuras compilaciones
      - name: Cache Buildozer Settings
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # 3. Compilar usando Python 3.12.6
      - name: Build APK
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: 3.11.11
          buildozer-cmd: |
            export BUILDOZER_ALLOW_ORG_TEST_DOMAIN=1
            buildozer -v android debug

      # 4. Subir el APK generado
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Botsito-APK
          path: ./bin/*.apk
